    fetch('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/'+SST_LAYER+'/default/'+tries[idx]+'/'+MATRIX+'/6/24/19.png')
      .then(function(r){return r.ok?r.blob():null;})
      .then(function(b){
        if(b&&b.size>1500)document.getElementById('satdate').value=tries[idx];
        else probe(idx+1);
      }).catch(function(){probe(idx+1);});
  }
  probe(0);
})();

function toggleOverlay(kind){
  var btn=document.getElementById(kind==='chl'?'chlBtn':'sstBtn');
  var other=kind==='chl'?'sst':'chl';
  var otherBtn=document.getElementById(other==='chl'?'chlBtn':'sstBtn');
  var cur=kind==='chl'?chlLayer:sstLayer;
  // remove the other overlay for clarity
  if(other==='chl'&&chlLayer){map.removeLayer(chlLayer);chlLayer=null;otherBtn.className='';}
  if(other==='sst'&&sstLayer){map.removeLayer(sstLayer);sstLayer=null;otherBtn.className='';}
  if(cur){
    map.removeLayer(cur);
    if(kind==='chl')chlLayer=null; else sstLayer=null;
    btn.className=''; setLegend(null);
    return;
  }
  // Chlorophyll stacks three satellites (PACE, NOAA-21, NOAA-20) so one fills
  // the swath gaps and cloud holes of the others, and draws the previous day
  // underneath as a fallback where clouds beat all three on the selected day
  var subs;
  if(kind==='chl'){
    subs=[];
    [dayBefore(satDate()), satDate()].forEach(function(d){
      CHL_SATS.forEach(function(sat){ subs.push(gibs(sat, MATRIX, d)); });
    });
  } else {
    subs=[gibs(SST_LAYER, MATRIX, satDate())];
  }
  var lyr=L.layerGroup(subs);
  var okCount=0, errCount=0;
  subs.forEach(function(s){
    s.on('tileload',function(){okCount++;});
    s.on('tileerror',function(){
      errCount++;
      if(okCount===0 && errCount>=subs.length*3){
        document.getElementById('readout').innerHTML=
          '<i>No satellite data for '+satDate()+' (cloud cover or not published yet). Try a date 2-4 days back.</i>';
      }
    });
  });
  lyr.addTo(map);
  if(kind==='chl')chlLayer=lyr; else sstLayer=lyr;
  btn.className='on'; setLegend(kind);
  document.getElementById('readout').innerHTML = (kind==='chl'
    ? 'Chlorophyll on. Look for <b>color breaks</b> (green meeting blue) near your offshore spots. Change Sat date if patchy.'
    : 'Water temp on. Hunt <b>temp breaks</b> where warm and cool water meet. <b>Tap the water</b> for the exact temp.');
}

// ---- helpers ----
function nmDist(a,b){var R=3440.065,r=Math.PI/180;
  var x=Math.sin(a.lat*r)*Math.sin(b.lat*r)+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.cos((b.lng-a.lng)*r);
  return R*Math.acos(Math.min(1,x));}
function bearing(a,b){var r=Math.PI/180;
  var y=Math.sin((b.lng-a.lng)*r)*Math.cos(b.lat*r);
  var x=Math.cos(a.lat*r)*Math.sin(b.lat*r)-Math.sin(a.lat*r)*Math.cos(b.lat*r)*Math.cos((b.lng-a.lng)*r);
  return (Math.atan2(y,x)/r+360)%360;}

// ---- automatic front detection ----
// Runs edge detection on the same NASA imagery the overlays show: sharp color
// change in the SST layer = temp break, in the chlorophyll stack = color break,
// both together = the prime edge. Computed for the current view on demand.
var frontsOverlay=null, frontsBusy=false;
function tileRange(z){
  var b=map.getBounds();
  function t(lat,lon){
    var n=Math.pow(2,z), x=Math.floor((lon+180)/360*n);
    var la=lat*Math.PI/180;
    var y=Math.floor((1-Math.log(Math.tan(la)+1/Math.cos(la))/Math.PI)/2*n);
    return [Math.max(0,Math.min(n-1,x)),Math.max(0,Math.min(n-1,y))];
  }
  var a=t(b.getNorth(),b.getWest()), c=t(b.getSouth(),b.getEast());
  return {x0:a[0],y0:a[1],x1:c[0],y1:c[1],z:z};
}
function tileRangeBounds(r){
  function lat(y,z){var n=Math.PI-2*Math.PI*y/Math.pow(2,z);return 180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));}
  function lon(x,z){return x/Math.pow(2,z)*360-180;}
  return L.latLngBounds([lat(r.y1+1,r.z),lon(r.x0,r.z)],[lat(r.y0,r.z),lon(r.x1+1,r.z)]);
}
function loadMosaic(specs,r,cb){
  var w=(r.x1-r.x0+1)*256, h=(r.y1-r.y0+1)*256;
  if(w>4096||h>4096){cb(null);return;}
  var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  var ctx=cv.getContext('2d',{willReadFrequently:true});
  var pending=0, anyLoaded=false;
  // draw layer by layer in order so later specs paint over earlier ones,
  // matching what the map shows on screen
  function drawSpec(si){
    if(si>=specs.length){cb(anyLoaded?cv:null);return;}
    var spec=specs[si];
    pending=0;
    var done=function(){pending--;if(pending===0)drawSpec(si+1);};
    for(var x=r.x0;x<=r.x1;x++)for(var y=r.y0;y<=r.y1;y++)pending++;
    var count=pending;
    if(count===0){drawSpec(si+1);return;}
    for(var xx=r.x0;xx<=r.x1;xx++)for(var yy=r.y0;yy<=r.y1;yy++){
      (function(x,y){
        var img=new Image(); img.crossOrigin='anonymous';
        img.onload=function(){ctx.drawImage(img,(x-r.x0)*256,(y-r.y0)*256);anyLoaded=true;done();};
        img.onerror=function(){done();};
        img.src='https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/'+spec.layer+'/default/'+spec.date+'/'+MATRIX+'/'+r.z+'/'+y+'/'+x+'.png';
      })(xx,yy);
    }
  }
  drawSpec(0);
}
function edgeMap(cv,thresh,smooth){
  var w=cv.width,h=cv.height;
  var d=cv.getContext('2d').getImageData(0,0,w,h).data;
  if(smooth){
    // 5x5 box blur (alpha-aware) to knock the speckle out of chlorophyll imagery
    var sm=new Uint8ClampedArray(d.length);
    for(var y=0;y<h;y++)for(var x=0;x<w;x++){
      var i=(y*w+x)*4;
      if(d[i+3]<200){sm[i+3]=d[i+3];continue;}
      var r=0,g=0,b=0,n=0;
      for(var dy=-2;dy<=2;dy++)for(var dx=-2;dx<=2;dx++){
        var yy=y+dy,xx=x+dx;
        if(yy<0||yy>=h||xx<0||xx>=w)continue;
        var j=(yy*w+xx)*4;
        if(d[j+3]<200)continue;
        r+=d[j];g+=d[j+1];b+=d[j+2];n++;
      }
      sm[i]=r/n;sm[i+1]=g/n;sm[i+2]=b/n;sm[i+3]=255;
    }
    d=sm;
  }
  // gradient measured across a 2 px step, which at z7 is the same physical
  // distance the old z6 single-pixel step covered, so thresholds carry over
  var ST=2, raw=new Uint8Array(w*h);
  for(var y2=ST;y2<h-ST;y2++)for(var x2=ST;x2<w-ST;x2++){
    var i2=(y2*w+x2)*4;
    if(d[i2+3]<200)continue;                       // no data here
    var ir=(y2*w+x2+ST)*4, idn=((y2+ST)*w+x2)*4;
    if(d[ir+3]<200||d[idn+3]<200)continue;         // no gradient across data edges (clouds)
    var gx=Math.abs(d[i2]-d[ir])+Math.abs(d[i2+1]-d[ir+1])+Math.abs(d[i2+2]-d[ir+2]);
    var gy=Math.abs(d[i2]-d[idn])+Math.abs(d[i2+1]-d[idn+1])+Math.abs(d[i2+2]-d[idn+2]);
    if(gx+gy>thresh)raw[y2*w+x2]=1;
  }
  // despeckle: keep an edge pixel only if at least 2 of its 8 neighbors are edges,
  // so isolated noise drops out and real front lines stay connected
  var out=new Uint8Array(w*h);
  for(var y3=1;y3<h-1;y3++)for(var x3=1;x3<w-1;x3++){
    var i3=y3*w+x3;
    if(!raw[i3])continue;
    var nb=raw[i3-1]+raw[i3+1]+raw[i3-w]+raw[i3+w]+raw[i3-w-1]+raw[i3-w+1]+raw[i3+w-1]+raw[i3+w+1];
    if(nb>=2)out[i3]=1;
  }
  return out;
}
function detectFronts(cb){
  // always work at z7, the imagery's full native resolution (~1 km pixels)
  var r=tileRange(7);
  var d=satDate(), dp=dayBefore(d);
  var sstSpec=[{layer:SST_LAYER,date:d}];
  var chlSpec=[];
  [dp,d].forEach(function(dd){CHL_SATS.forEach(function(s){chlSpec.push({layer:s,date:dd});});});
  loadMosaic(sstSpec,r,function(sstCv){
    loadMosaic(chlSpec,r,function(chlCv){
      if(!sstCv&&!chlCv){cb(false);return;}
      var w=(sstCv||chlCv).width, h=(sstCv||chlCv).height;
      var se,ce;
      try{
        se=sstCv?edgeMap(sstCv,35,false):new Uint8Array(w*h);
        ce=chlCv?edgeMap(chlCv,60,true):new Uint8Array(w*h);
      }catch(err){cb(false);return;}
      // dilate the chl edges by 2 px so "both" means a color break within ~1 km of a temp break
      var ced=new Uint8Array(w*h);
      for(var yd=2;yd<h-2;yd++)for(var xd=2;xd<w-2;xd++){
        if(!ce[yd*w+xd])continue;
        for(var q=-2;q<=2;q++)for(var u=-2;u<=2;u++)ced[(yd+q)*w+(xd+u)]=1;
      }
      var out=document.createElement('canvas'); out.width=w; out.height=h;
      var octx=out.getContext('2d');
      var od=octx.createImageData(w,h), p=od.data;
      for(var y=1;y<h-1;y++)for(var x=1;x<w-1;x++){
        var i=y*w+x;
        var s=se[i], c=ce[i];
        if(!s&&!c)continue;
        var o=i*4;
        if(s&&ced[i]){p[o]=196;p[o+1]=0;p[o+2]=196;}      // purple: temp + color together
        else if(s){p[o]=230;p[o+1]=48;p[o+2]=0;}          // red: temp break
        else{p[o]=10;p[o+1]=138;p[o+2]=31;}               // green: color break
        p[o+3]=235;
      }
      octx.putImageData(od,0,0);
      if(frontsOverlay)map.removeLayer(frontsOverlay);
      frontsOverlay=L.imageOverlay(out.toDataURL(),tileRangeBounds(r),{opacity:.9,interactive:false});
      frontsOverlay.addTo(map);
      cb(true);
    });
  });
}
document.getElementById('frontsBtn').onclick=function(){
  var btn=this;
  if(frontsOverlay){map.removeLayer(frontsOverlay);frontsOverlay=null;btn.className='';return;}
  if(frontsBusy)return;
  frontsBusy=true; btn.className='on';
  document.getElementById('readout').innerHTML='Scanning the satellite imagery for breaks...';
  detectFronts(function(ok){
    frontsBusy=false;
    if(!ok){
      btn.className='';
      document.getElementById('readout').innerHTML='<i>Could not read the satellite imagery here. Zoom to your water and try again, or roll the Sat date back.</i>';
      return;
    }
    document.getElementById('readout').innerHTML='<b>Fronts:</b> <span style="color:#e63000">red = temp break</span>, '+
      '<span style="color:#0a8a1f">green = color break</span>, <span style="color:#c400c4">purple = both (prime water)</span>. '+
      'After moving the chart, tap Fronts twice to rescan.';
  });
};

L.control.layers(
 {'OpenStreetMap':osm,'NOAA Nautical Chart (depths)':encChart,'GEBCO bathymetry':gebco,'Esri Ocean basemap':esriOcean},
 {'Inshore spots (blue)':inshore,'Offshore spots (red)':offshore,'Our spots (purple)':customLayer,
  'Range rings: Coecles':ringsC,'Range rings: Montauk':ringsM,'Coecles route corridor':corridor}
).addTo(map);

function toggleLabels(){var show=map.getZoom()>=9;
  document.querySelectorAll('.lbl').forEach(function(el){el.style.display=show?'':'none';});}
map.on('zoomend',toggleLabels); toggleLabels();

var collapsed=false;
document.getElementById('collapseBtn').onclick=function(){
  collapsed=!collapsed;
  document.getElementById('panelBody').style.display=collapsed?'none':'';
};

pullSpots();
